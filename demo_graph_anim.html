<!DOCTYPE html>
<html>
<head>
    <title>Curriculum Analytics Map</title>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            margin: 0;
            padding: 24px;
            display: flex;
            flex-direction: column;
            height: 94vh;
        }
        .header { margin-bottom: 20px; }
        h2 { color: #0f172a; margin: 0 0 4px 0; font-size: 22px; font-weight: 700; }
        p { color: #64748b; margin: 0; font-size: 14px; }
        
        .main-container {
            display: flex;
            flex: 1;
            gap: 24px;
            height: calc(100% - 65px);
        }
        
        .graph-container {
            flex: 1;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.03);
            position: relative;
            overflow: hidden;
        }
        
        .info-panel {
            width: 380px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.04);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .panel-placeholder {
            color: #94a3b8;
            text-align: center;
            margin: auto;
            font-size: 15px;
            line-height: 1.8;
            padding: 20px;
        }
        .panel-placeholder-icon {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
        }
        
        .panel-content { display: none; flex-direction: column; }
        
        .section-label { 
            font-size: 11px; 
            font-weight: 700; 
            color: #64748b; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            margin: 24px 0 8px 0;
        }
        .section-label:first-of-type { margin-top: 0; }
        
        .node-id-display {
            display: inline-block;
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            color: #92400E;
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 4px;
        }
        
        .node-title { 
            font-size: 24px; 
            font-weight: 800; 
            color: #0f172a; 
            margin: 8px 0 4px 0; 
            letter-spacing: -0.02em; 
            line-height: 1.3;
        }
        
        .node-desc {
            font-size: 15px;
            color: #1e293b;
            line-height: 1.7;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 18px 20px;
            border-left: 4px solid #F59E0B;
            font-weight: 450;
        }

        .prereq-list { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 4px; 
        }
        
        .prereq-pill {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 14px;
            color: #0f172a;
            font-weight: 500;
            line-height: 1.5;
            transition: all 0.2s;
        }
        .prereq-pill:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            transform: translateX(4px);
        }
        .prereq-pill .pill-id { 
            display: inline-block;
            font-size: 11px; 
            font-weight: 700;
            color: #8B5CF6;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: #ede9fe;
            padding: 2px 10px;
            border-radius: 4px;
            margin-right: 8px;
        }
        .prereq-pill .pill-text {
            color: #334155;
        }
        .no-prereqs { 
            font-size: 14px; 
            color: #94a3b8; 
            font-style: italic;
            padding: 12px 0;
        }
        
        /* Connection status indicator */
        .connection-status {
            display: flex;
            gap: 20px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #475569;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }
        .status-dot.amber {
            background: #F59E0B;
        }
        .status-dot.purple {
            background: #8B5CF6;
        }
        .status-count {
            font-weight: 700;
            color: #0f172a;
        }
        
        svg { width: 100%; height: 100%; cursor: grab; }
        svg:active { cursor: grabbing; }
        
        
        .node polygon { transition: fill 0.2s, stroke 0.2s; }
        
        /* Edge styling with beautiful colors */
        .edge-path {
            transition: stroke 0.3s, stroke-width 0.3s;
        }
        .edge-arrow {
            transition: stroke 0.3s, fill 0.3s;
        }
        
        /* Incoming edges - Warm Amber/Orange (feels like knowledge flowing in) */
        .edge-incoming .edge-path {
            stroke: #F59E0B !important;
            stroke-width: 4px !important;
        }
        .edge-incoming .edge-arrow {
            stroke: #F59E0B !important;
            fill: #F59E0B !important;
        }
        
        /* Outgoing edges - Vibrant Purple (feels like knowledge branching out) */
        .edge-outgoing .edge-path {
            stroke: #8B5CF6 !important;
            stroke-width: 4px !important;
        }
        .edge-outgoing .edge-arrow {
            stroke: #8B5CF6 !important;
            fill: #8B5CF6 !important;
        }
        
        /* Node highlight colors */
        .node-highlight polygon {
            fill: #FEF3C7 !important;
            stroke: #F59E0B !important;
            stroke-width: 2.5px !important;
        }
    </style>

    

    

    <style>
        
        .node text {
            fill: #000000 !important;
            font-weight: 700 !important;
        }
    </style>
</head>

    <script>
        var panZoomInstance = null;
        var isInitialized = false;

        function initGraphInteractions() {
            if (isInitialized) return;
            var svgElement = document.getElementById("interactive-svg");
            if (!svgElement) return;

            try {
                panZoomInstance = svgPanZoom("#interactive-svg", {
                    zoomEnabled: false,
                    panEnabled: false,
                    controlIconsEnabled: false,
                    fit: true,
                    center: true
                });
            } catch (e) {
                return;
            }
            isInitialized = true;
        }

        var ro = new ResizeObserver(function(entries) {
            for (var i = 0; i < entries.length; i++) {
                var entry = entries[i];
                if (entry.contentRect.width > 0 && entry.contentRect.height > 0) {
                    if (!isInitialized) {
                        initGraphInteractions();
                    }
                    if (panZoomInstance) {
                        panZoomInstance.resize();
                        panZoomInstance.fit();
                        panZoomInstance.center();
                    }
                }
            }
        });
        
        var container = document.querySelector(".graph-container");
        if (container) {
            ro.observe(container);
        }
    </script>
